<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5E Science Lesson Plan Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1f1c;--ink2:#3d4a43;--ink3:#6b7a70;
  --sage:#4a7c59;--sage-light:#e8f2eb;--sage-mid:#c2dbc9;--sage-dark:#2d5c3f;
  --gold:#c8963a;--gold-light:#fdf3e3;
  --sky:#2d6fa3;--sky-light:#e5f0f9;--sky-mid:#a8cceb;
  --rust:#b54a2e;--rust-light:#fdf0ec;
  --paper:#f8f6f1;--white:#ffffff;--border:#ddd8ce;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.hero{background:var(--sage-dark);padding:2.8rem 2rem 2.2rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-100px;top:-100px;width:400px;height:400px;border-radius:50%;background:var(--sage);opacity:.2}
.hero::after{content:'5E';position:absolute;right:2rem;bottom:-1.5rem;font-family:'Playfair Display',serif;font-size:9rem;color:rgba(255,255,255,.06);line-height:1;pointer-events:none}
.hero-inner{max-width:860px;margin:0 auto;position:relative;z-index:1}
.hero-eye{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-mid);margin-bottom:.75rem}
.hero h1{font-family:'Playfair Display',serif;font-size:2.4rem;color:#fff;line-height:1.15;margin-bottom:.35rem}
.hero-ver{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.05em;margin-bottom:.8rem}
.hero-sub{font-size:.95rem;color:var(--sage-mid);font-weight:300;max-width:480px}
.main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:1.8rem 2rem;margin-bottom:1.5rem;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.card-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--sage-dark);margin-bottom:1.4rem;display:flex;align-items:center;gap:10px}
.ct-icon{width:30px;height:30px;background:var(--sage-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.1rem}
.fgf{grid-column:1/-1}
.fgrp{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3)}
input[type=text],select,textarea{font-family:'Source Sans 3',sans-serif;font-size:14px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s,background .15s;width:100%}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--sage);background:#fff}
textarea{resize:vertical;min-height:65px}
.gen-btn{width:100%;padding:13px;background:var(--sage-dark);color:#fff;border:none;border-radius:10px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1.2rem}
.gen-btn:hover{background:var(--sage)}.gen-btn:active{transform:scale(.99)}.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.cwrap{margin-top:1.2rem;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.cbar{background:#1e2320;padding:7px 13px;display:flex;align-items:center;justify-content:space-between}
.cbar-l{display:flex;align-items:center;gap:8px}
.cdots{display:flex;gap:5px}.cdots span{width:9px;height:9px;border-radius:50%}
.cdots span:nth-child(1){background:#ff5f57}.cdots span:nth-child(2){background:#febc2e}.cdots span:nth-child(3){background:#28c840}
.clabel{font-size:11px;color:#5a6660;font-family:monospace}
.cclear{background:none;border:1px solid #3a4440;color:#5a6660;font-family:monospace;font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.cclear:hover{border-color:#6a7670;color:#9ab0a0}
.cbody{background:#181c1a;padding:9px 13px;min-height:80px;max-height:180px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.75}
.cempty{color:#3a4a40;font-style:italic}
.cline{display:flex;gap:10px;border-bottom:1px solid rgba(255,255,255,.03);padding:1px 0}.cline:last-child{border-bottom:none}
.cts{color:#3a4a40;flex-shrink:0}
.cline.info .cmsg{color:#6db8e8}.cline.success .cmsg{color:#7ecb8f}.cline.warn .cmsg{color:#e8c96d}.cline.error .cmsg{color:#e87a7a}.cline.log .cmsg{color:#9ab8a8}
#lesson-out{display:none}
.lhdr{background:var(--sage-dark);border-radius:16px 16px 0 0;padding:2rem;color:#fff;position:relative;overflow:hidden}
.lhdr::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:var(--sage);opacity:.25}
.lhpills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.9rem}
.lhpill{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:11px;padding:3px 11px;border-radius:20px;font-weight:600}
.lhtitle{font-family:'Playfair Display',serif;font-size:1.85rem;line-height:1.2;position:relative;z-index:1;margin-bottom:.3rem}
.lhsub{color:var(--sage-mid);font-size:14px;position:relative;z-index:1;font-weight:300}
.lbody{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;overflow:hidden}
.etabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;background:#fff}
.etab{flex:1;min-width:90px;padding:11px 6px;border:none;background:transparent;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap}
.etab:hover{color:var(--sage)}.etab.active{color:var(--sage-dark);border-bottom-color:var(--sage);background:var(--sage-light)}
.esec{display:none;padding:2rem;animation:fadeUp .2s ease}.esec.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.sechdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:1.5rem}
.secbadge{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;flex-shrink:0}
.secbadge.engage{background:var(--rust-light);color:var(--rust)}
.secbadge.explore{background:var(--sage-light);color:var(--sage-dark)}
.secbadge.explain{background:var(--sky-light);color:var(--sky)}
.secbadge.elaborate{background:var(--gold-light);color:var(--gold)}
.secbadge.evaluate{background:var(--sage-light);color:var(--sage-dark)}
.secbadge.ngss{background:var(--sky-light);color:var(--sky)}
.seclbl h3{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--ink);margin-bottom:2px}
.seclbl p{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:600}
.blk{background:var(--paper);border-radius:9px;padding:1.15rem 1.3rem;margin-bottom:1rem}
.blk h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);margin-bottom:.65rem}
.blk p,.blk li{font-size:14px;line-height:1.8;color:var(--ink2)}
.blk ul,.blk ol{padding-left:1.3rem}.blk li{margin-bottom:3px}
.mcard{border:1.5px solid var(--sky-mid);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.mcard-hdr{background:var(--sky-light);padding:11px 15px;display:flex;align-items:center;gap:10px}
.mcard-hdr strong{display:block;font-size:13px;color:var(--sky);font-weight:600}
.mcard-hdr small{font-size:11px;color:var(--sky)}
.mcard-body{padding:13px 15px}
.mcard-body p{font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:10px}
.mbtn{display:inline-flex;align-items:center;gap:6px;background:var(--sky);color:#fff;text-decoration:none;padding:7px 15px;border-radius:7px;font-size:13px;font-weight:600;transition:background .15s}
.mbtn:hover{background:var(--sage-dark)}
.qitem{background:#fff;border:1px solid var(--border);border-radius:9px;padding:.95rem 1.15rem;margin-bottom:.7rem;border-left:3px solid var(--sage-mid)}
.qnum{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sage);margin-bottom:4px}
.qitem p{font-size:14px;color:var(--ink2);line-height:1.7}
.qmap{margin-top:7px;padding:7px 10px;background:var(--sky-light);border-radius:6px;font-size:12px;color:var(--sky)}
.vitem{padding:8px 0;border-bottom:1px solid var(--border)}.vitem:last-child{border-bottom:none}
.vterm{font-size:13px;font-weight:600;color:var(--sage-dark)}.vdef{font-size:13px;color:var(--ink3)}
.nitem{background:#fff;border:1px solid var(--border);border-radius:9px;padding:.95rem 1.15rem;margin-bottom:.7rem}
.ncode{display:inline-block;background:var(--sage-light);color:var(--sage-dark);font-size:11px;font-weight:700;padding:2px 9px;border-radius:5px;font-family:monospace;margin-bottom:6px}
.ncat{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:5px;margin-left:6px;letter-spacing:.04em}
.ncat.pe{background:var(--sage-light);color:var(--sage-dark)}.ncat.dci{background:var(--sky-light);color:var(--sky)}
.ncat.sep{background:var(--gold-light);color:var(--gold)}.ncat.cc{background:var(--rust-light);color:var(--rust)}
.ntitle{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}
.ndesc{font-size:13px;color:var(--ink3);line-height:1.65}
.actbar{padding:1.2rem 2rem;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--paper);border-radius:0 0 16px 16px}
.abtn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.abtn.sec{background:#fff;color:var(--ink2);border:1.5px solid var(--border)}.abtn.sec:hover{border-color:var(--sage);color:var(--sage-dark)}
.abtn.pri{background:var(--sage-dark);color:#fff}.abtn.pri:hover{background:var(--sage)}
@media(max-width:600px){.hero h1{font-size:1.7rem}.fg{grid-template-columns:1fr}.actbar{flex-direction:column}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eye">5E Instructional Model &middot; K&ndash;12</div>
    <h1>Science Lesson Plan Builder</h1>
    <div class="hero-ver">Version 1.0</div>
    <p class="hero-sub">Generate complete, NGSS-aligned lesson plans with ArcGIS map activities &mdash; works entirely offline, no API key needed.</p>
  </div>
</div>

<div class="main">
  <div class="card">
    <div class="card-title"><span class="ct-icon">&#x2697;&#xFE0F;</span> Configure Your Lesson</div>
    <div class="fg">
      <div class="fgrp fgf"><label>Science Topic</label><input type="text" id="topic" placeholder="e.g., Tornadoes, Watersheds, Plate Tectonics, Ecosystems, Photosynthesis&hellip;"></div>
    </div>
    <div class="fg">
      <div class="fgrp"><label>Grade Band</label>
        <select id="grade">
          <option value="">Select grade band&hellip;</option>
          <option value="K-2">K&ndash;2 (Primary)</option>
          <option value="3-5">3&ndash;5 (Upper Elementary)</option>
          <option value="6-8">6&ndash;8 (Middle School)</option>
          <option value="9-12">9&ndash;12 (High School)</option>
        </select>
      </div>
      <div class="fgrp"><label>Science Domain</label>
        <select id="domain">
          <option value="General Science">General Science</option>
          <option value="Life Science">Life Science</option>
          <option value="Earth &amp; Space Science">Earth &amp; Space Science</option>
          <option value="Physical Science">Physical Science</option>
          <option value="Environmental Science">Environmental Science</option>
          <option value="Engineering &amp; Technology">Engineering &amp; Technology</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <div class="fgrp"><label>Lesson Duration</label>
        <select id="duration">
          <option value="20 minutes">20 minutes (mini lesson)</option>
          <option value="45 minutes">45 minutes (1 class period)</option>
          <option value="90 minutes" selected>90 minutes (block period)</option>
          <option value="2-3 class periods">2&ndash;3 class periods</option>
          <option value="1 week">1 week unit</option>
        </select>
      </div>
      <div class="fgrp"><label>Geographic Focus (optional)</label><input type="text" id="geo" placeholder="e.g., Great Plains, Pacific Northwest&hellip;"></div>
    </div>
    <div class="fg">
      <div class="fgrp fgf"><label>Additional Context (optional)</label><textarea id="ctx" placeholder="Specific objectives, local connections, accommodations&hellip;"></textarea></div>
    </div>
    <button class="gen-btn" id="genbtn" onclick="generate()">&#10022; Generate 5E Lesson Plan</button>
    <div class="cwrap">
      <div class="cbar">
        <div class="cbar-l"><div class="cdots"><span></span><span></span><span></span></div><span class="clabel">System Console &mdash; v1.0</span></div>
        <button class="cclear" onclick="clearCon()">Clear</button>
      </div>
      <div class="cbody" id="con"><span class="cempty">No messages yet.</span></div>
    </div>
  </div>

  <div id="lesson-out">
    <div class="lhdr">
      <div class="lhpills" id="pills"></div>
      <div class="lhtitle" id="ltitle"></div>
      <div class="lhsub" id="lsub"></div>
    </div>
    <div class="lbody">
      <div class="etabs">
        <button class="etab active" onclick="tab('engage',this)">&#128293; Engage</button>
        <button class="etab" onclick="tab('explore',this)">&#128269; Explore</button>
        <button class="etab" onclick="tab('explain',this)">&#128161; Explain</button>
        <button class="etab" onclick="tab('elaborate',this)">&#127760; Elaborate</button>
        <button class="etab" onclick="tab('evaluate',this)">&#9989; Evaluate</button>
        <button class="etab" onclick="tab('ngss',this)">&#128203; Standards</button>
      </div>
      <div id="s-engage" class="esec active"></div>
      <div id="s-explore" class="esec"></div>
      <div id="s-explain" class="esec"></div>
      <div id="s-elaborate" class="esec"></div>
      <div id="s-evaluate" class="esec"></div>
      <div id="s-ngss" class="esec"></div>
      <div class="actbar">
        <button class="abtn sec" onclick="generate()">&#8634; Regenerate</button>
        <button class="abtn pri" onclick="dlRTF()">&#11015; Download RTF</button>
      </div>
    </div>
  </div>
</div>

<script>
var LESSON=null;

function clog(msg,type){
  type=type||'log';
  var b=document.getElementById('con');
  var e=b.querySelector('.cempty');if(e)e.remove();
  var now=new Date(),ts=now.toTimeString().slice(0,8);
  var ln=document.createElement('div');ln.className='cline '+type;
  ln.innerHTML='<span class="cts">'+ts+'</span><span class="cmsg">'+String(msg).replace(/</g,'&lt;')+'</span>';
  b.appendChild(ln);b.scrollTop=b.scrollHeight;
}
function clearCon(){document.getElementById('con').innerHTML='<span class="cempty">Console cleared.</span>';}
function tab(id,btn){
  document.querySelectorAll('.esec').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.etab').forEach(function(b){b.classList.remove('active');});
  document.getElementById('s-'+id).classList.add('active');
  btn.classList.add('active');
}

        rubric:['Quantifies the latitudinal gradient with specific data values and calculates a gradient slope or correlation coefficient','Evaluates protected area coverage adequacy using proportional biome representation data','Applies net primary productivity, trophic cascade, and island biogeography concepts with precision','Designs a conservation strategy with explicit criteria, geographic justification from map data, and acknowledgment of uncertainty'],
        ngss:[
          {code:'HS-LS2-6',title:'Ecosystems',desc:'Evaluate the claims, evidence, and reasoning that complex interactions in ecosystems maintain relatively consistent numbers and types of organisms in stable conditions, but that changing conditions may result in a new ecosystem.',cat:'PE'},
          {code:'HS-LS4-6',title:'Biological Evolution',desc:'Create or revise a simulation to test a solution to mitigate adverse impacts of human activity on biodiversity.',cat:'PE'},
          {code:'SEP-6',title:'Constructing Explanations',desc:'Construct an explanation based on valid and reliable evidence from multiple sources and consistent with multiple lines of evidence.',cat:'SEP'},
          {code:'CC-7',title:'Stability and Change',desc:'Much of science deals with constructing explanations of how things change and how they remain stable. Feedback mechanisms can stabilize or destabilize a system.',cat:'CC'}
        ]
      }
    }
  }
};

// ── MATCHER ─────────────────────────────────────────────────────────────────
function matchProfile(input){
  var q=input.toLowerCase();
  for(var k in DB){
    var p=DB[k];
    for(var i=0;i<p.keys.length;i++){if(q.indexOf(p.keys[i])!==-1)return p;}
  }
  return null;
}

// ── GENERIC FALLBACK ────────────────────────────────────────────────────────
function genericLesson(topic,grade,domain,duration,geo){
  var tc=topic.charAt(0).toUpperCase()+topic.slice(1);
  var geoNote=geo?' with a focus on the '+geo+' region':'';
  var hooks={'K-2':'Show an interesting photo related to your topic. Ask: "What do you notice? What do you wonder?"',
    '3-5':'Present a puzzling observation about your topic. Ask students to brainstorm explanations in pairs before sharing.',
    '6-8':'Show real-world data connected to the topic. Ask: "What questions does this raise? What would you need to know to explain this?"',
    '9-12':'Present a complex real-world problem connected to the topic. Ask students to identify known facts, knowledge gaps, and first steps of investigation.'};
  return {
    title:tc, subtitle:'A '+duration+' 5E lesson for '+gradeLabel(grade)+geoNote,
    gradeband:grade, domain:domain||'Science', duration:duration,
    engage:{
      hook:hooks[grade]||hooks['6-8'],
      priorQ:['What do you already know about '+topic+'?','Where have you seen '+topic+' in your everyday life?','What questions do you have about '+topic+'?'],
      materials:['Computers or tablets with internet access','Student science notebooks','Pencils and colored pencils'],
      teacherNotes:'Record student prior knowledge and questions on chart paper. Revisit these at the end of the lesson to celebrate growth in understanding. Avoid correcting misconceptions now.'
    },
    explore:{
      overview:'Students use ArcGIS online mapping to investigate real spatial data related to '+topic+'. They explore available layers, identify patterns, and record observations before drawing conclusions.',
      mapUrl:'https://www.arcgis.com/apps/mapviewer/index.html',
      mapLayers:['Environmental monitoring data relevant to topic','Geographic distribution and occurrence data','Government observational datasets'],
      mapDesc:'Search the ArcGIS Living Atlas for layers related to '+topic+'. Look for environmental monitoring data, geographic distribution layers, and relevant government datasets.',
      mapInstr:'Go to the ArcGIS map link. Use the layer list to find data related to '+topic+'. Click at least 5 locations and record what you find. Look for geographic patterns.',
      questions:[
        {q:'Where does '+topic+' occur most frequently according to the map data?',map:'Zoom out to see the full extent of the data and look for clusters or concentrations.',bloom:'Remembering'},
        {q:'What geographic patterns do you notice in how '+topic+' is distributed across the map?',map:'Compare areas with high and low occurrence. What other geographic features do they share?',bloom:'Analyzing'},
        {q:'What factors do you think explain the geographic distribution pattern you observed?',map:'Toggle additional layers such as climate, population, or land use to look for correlations.',bloom:'Evaluating'},
        {q:'Based on the map data, where would you focus resources to address challenges related to '+topic+'?',map:'Identify the highest-need or highest-risk areas using the data and estimate their extent.',bloom:'Creating'}
      ]
    },
    explain:{
      vocab:[{t:tc,d:'The scientific phenomenon or concept being studied in this lesson'},{t:'Spatial pattern',d:'The geographic arrangement or distribution of a phenomenon across an area'},{t:'Data layer',d:'A set of geographic data displayed on a map, such as population or climate information'},{t:'Evidence',d:'Data or observations used to support a scientific claim or explanation'}],
      concepts:[''+tc+' can be observed and measured using real-world spatial data','Geographic patterns in data reveal underlying scientific relationships and processes','Maps and spatial analysis tools are essential for modern scientific investigation'],
      discussion:['How did the map data change or confirm what you thought you knew about '+topic+'?','What additional data would you want to see to better understand this topic?'],
      teacherNotes:'Connect students map findings to the key scientific concepts. Use direct instruction to explain the mechanisms behind the patterns students observed. Fill conceptual gaps without dismissing student-generated reasoning.'
    },
    elaborate:{
      activity:'Students apply their understanding of '+topic+' to investigate a local or regional connection'+geoNote+', using the ArcGIS map to compare their community with other places.',
      realWorld:['Scientists study '+topic+' using the same types of data tools and maps used in this lesson','Understanding '+topic+' helps communities make better decisions about safety and resource management','Technology like satellite imagery and GIS enables monitoring of changes in '+topic+' over time at scales impossible by other means'],
      extensionMap:'Challenge students to compare '+topic+' data across two very different regions and write a structured analysis explaining the differences using at least three specific pieces of map evidence.',
      groupWork:'Groups create a community connection brief — they find their local community on the map, document what the data shows about '+topic+' in their area, and present their findings with at least two map-based evidence points.'
    },
    evaluate:{
      formative:['Observation during map activity — check that students are reading data layers correctly and framing productive questions','Exit ticket reviewing key vocabulary and one main geographic pattern identified from the map exploration'],
      summative:'Students create an illustrated data report about '+topic+' using evidence from the ArcGIS map, including at least one annotated map screenshot and a written explanation connecting spatial data to scientific concepts.',
      exitQ:['Name one geographic pattern you found in the map data today and explain what scientific process or relationship it reveals.','How does what you learned about '+topic+' connect to a real decision made by people in your community?'],
      rubric:['Accurately identifies a geographic pattern in the map data with specific location references','Uses correct scientific vocabulary in written or verbal explanations','Connects map evidence to a scientific concept or mechanism related to '+topic,'Asks evidence-based questions and proposes testable hypotheses']
    },
    ngss:[
      {code:'SEP-4',title:'Analyzing & Interpreting Data',desc:'Analyze data using tools, technologies, and/or models to make valid and reliable scientific claims.',cat:'SEP'},
      {code:'SEP-6',title:'Constructing Explanations',desc:'Construct an explanation based on valid and reliable evidence from multiple sources.',cat:'SEP'},
      {code:'CC-1',title:'Patterns',desc:'Observed patterns of forms and events guide organization and classification, and they prompt questions about relationships and the factors that influence them.',cat:'CC'},
      {code:'CC-2',title:'Cause and Effect',desc:'Cause and effect relationships are routinely identified, tested, and used to explain change. Correlation does not necessarily imply causation.',cat:'CC'}
    ]
  };
}

function gradeLabel(g){return {'K-2':'Grades K–2','3-5':'Grades 3–5','6-8':'Grades 6–8','9-12':'Grades 9–12'}[g]||g;}

// ── BUILD STRUCTURED LESSON ─────────────────────────────────────────────────
function buildLesson(topic,grade,domain,duration,geo){
  var p=matchProfile(topic);
  if(!p) return genericLesson(topic,grade,domain,duration,geo);
  var d=p.data[grade];
  if(!d) d=p.data['6-8'];
  var geoNote=geo?' with a focus on the '+geo+' region':'';
  return {
    title:p.label,
    subtitle:'A '+duration+' 5E lesson for '+gradeLabel(grade)+geoNote,
    gradeband:grade,domain:domain||p.domain,duration:duration,
    engage:{hook:d.hook,priorQ:d.priorQ,materials:d.materials,teacherNotes:d.teacherNotes},
    explore:{
      overview:'Students use ArcGIS online mapping tools to investigate real '+p.label.toLowerCase()+' data. They examine spatial patterns, identify geographic trends, and answer inquiry questions that require direct map interaction before responding. This phase prioritizes student discovery over direct instruction.',
      mapUrl:p.mapUrl,mapLayers:p.mapLayers,mapDesc:p.mapDesc,mapInstr:d.mapInstr,questions:d.questions
    },
    explain:{vocab:d.vocab,concepts:d.concepts,discussion:d.discussion,teacherNotes:d.teacherNotes},
    elaborate:{activity:'Students apply their understanding of '+p.label.toLowerCase()+' to investigate a new but related scenario'+geoNote+'. They design a solution, construct an evidence-based argument, or explore a local connection using extended map data.',realWorld:d.realWorld,extensionMap:d.extensionMap,groupWork:d.groupWork},
    evaluate:{formative:d.formative,summative:d.summative,exitQ:d.exitQ,rubric:d.rubric},
    ngss:d.ngss
  };
}

function blk(hdr,body){return '<div class="blk"><h4>'+hdr+'</h4>'+body+'</div>';}

// ── GENERATE ─────────────────────────────────────────────────────────────────
function generate(){
  var topic=document.getElementById('topic').value.trim();
  var grade=document.getElementById('grade').value;
  var domain=document.getElementById('domain').value;
  var duration=document.getElementById('duration').value;
  var geo=document.getElementById('geo').value.trim();
  if(!topic||!grade){clog('ERROR: Please enter a science topic and select a grade band before generating.','error');return;}
  clog('Building lesson plan: "'+topic+'" | '+grade+' | '+duration,'info');
  var p=matchProfile(topic);
  if(p){clog('Matched knowledge base profile: '+p.label,'success');}
  else{clog('Topic not in built-in knowledge base — using general template. For richer output, try: Tornadoes, Watersheds, Plate Tectonics, or Ecosystems.','warn');}
  try{
    var l=buildLesson(topic,grade,domain,duration,geo);
    LESSON=l;
    clog('Lesson generated: '+l.ngss.length+' NGSS standards, '+l.explore.questions.length+' map questions.','success');
    render(l);
  }catch(err){
    clog('ERROR: '+err.message,'error');
    console.error(err);
  }
}

// ── RTF DOWNLOAD ─────────────────────────────────────────────────────────────
function dlRTF(){
  if(!LESSON){clog('No lesson generated yet.','warn');return;}
  var l=LESSON;
  function esc(s){return (s||'').replace(/\\/g,'\\\\').replace(/[{}]/g,function(m){return '\\'+m;}).replace(/[^\x00-\x7F]/g,function(c){var h=c.charCodeAt(0).toString(16);return "\\'"+h.padStart(2,'0');});}
  var h1=function(t){return '\\f1\\fs32\\b\\cf1 '+esc(t)+'\\b0\\cf0\\f0\\par\\par\n';};
  var h2=function(t){return '\\f1\\fs26\\b\\cf1 '+esc(t)+'\\b0\\cf0\\f0\\par\\par\n';};
  var h3=function(t){return '\\f1\\fs22\\b\\cf2 '+esc(t)+'\\b0\\cf0\\f0\\par\n';};
  var p=function(t){return '\\fs22 '+esc(t)+'\\par\\par\n';};
  var li=function(t){return '\\fs22 \\bullet  '+esc(t)+'\\par\n';};
  var sep=function(){return '\\par\\brdrb\\brdrs\\brdrw5 \\par\n';};
  var r='{\\rtf1\\ansi\\deff0\n{\\fonttbl{\\f0 Georgia;}{\\f1 Arial;}}\n{\\colortbl;\\red45\\green92\\blue63;\\red30\\green60\\blue40;}\n';
  r+=h1('5E Lesson Plan: '+l.title);r+=p(l.subtitle);r+=p('Grade Band: '+l.gradeband+'  |  Domain: '+l.domain+'  |  Duration: '+l.duration);r+=sep();
  r+=h2('ENGAGE');r+=h3('Opening Hook');r+=p(l.engage.hook);
  r+=h3('Prior Knowledge Questions');l.engage.priorQ.forEach(function(q){r+=li(q);});r+='\\par\n';
  r+=h3('Materials');l.engage.materials.forEach(function(m){r+=li(m);});r+='\\par\n';
  r+=h3('Teacher Notes');r+=p(l.engage.teacherNotes);r+=sep();
  r+=h2('EXPLORE');r+=p(l.explore.overview);
  r+=h3('ArcGIS Map Link');r+=p(l.explore.mapUrl);
  r+=h3('Suggested Feature Layers');l.explore.mapLayers.forEach(function(m){r+=li(m);});r+='\\par\n';
  r+=h3('Student Map Instructions');r+=p(l.explore.mapInstr);
  r+=h3('Map-Based Questions');
  l.explore.questions.forEach(function(q,i){
    r+='\\fs22\\b Q'+(i+1)+' ['+esc(q.bloom)+']:\\b0  '+esc(q.q)+'\\par\n';
    r+='\\fs20\\i Map Task: '+esc(q.map)+'\\i0\\par\\par\n';
  });r+=sep();
  r+=h2('EXPLAIN');r+=h3('Key Vocabulary');
  l.explain.vocab.forEach(function(v){r+='\\fs22\\b '+esc(v.t)+':\\b0  '+esc(v.d)+'\\par\n';});r+='\\par\n';
  r+=h3('Core Concepts');l.explain.concepts.forEach(function(c){r+=li(c);});r+='\\par\n';
  r+=h3('Discussion Prompts');l.explain.discussion.forEach(function(d){r+=li(d);});r+='\\par\n';r+=sep();
  r+=h2('ELABORATE');
  r+=h3('Extension Activity');r+=p(l.elaborate.activity);
  r+=h3('Real-World Connections');l.elaborate.realWorld.forEach(function(c){r+=li(c);});r+='\\par\n';
  r+=h3('Advanced Map Challenge');r+=p(l.elaborate.extensionMap);
  r+=h3('Collaborative Activity');r+=p(l.elaborate.groupWork);r+=sep();
  r+=h2('EVALUATE');
  r+=h3('Formative Assessments');l.evaluate.formative.forEach(function(f){r+=li(f);});r+='\\par\n';
  r+=h3('Summative Task');r+=p(l.evaluate.summative);
  r+=h3('Exit Ticket');l.evaluate.exitQ.forEach(function(e){r+=li(e);});r+='\\par\n';
  r+=h3('Rubric Criteria');l.evaluate.rubric.forEach(function(c){r+=li(c);});r+='\\par\n';r+=sep();
  r+=h2('NGSS Standards Alignment');
  var cl={PE:'Performance Expectation',DCI:'Disciplinary Core Idea',SEP:'Science & Engineering Practice',CC:'Crosscutting Concept'};
  l.ngss.forEach(function(n){r+='\\fs22\\b '+esc(n.code)+'\\b0  ['+esc(cl[n.cat]||n.cat)+']\\par\n'+esc(n.title)+'\\par\n\\fs20 '+esc(n.desc)+'\\par\\par\n';});
  r+=sep();r+=h2('ArcGIS Map Link');r+=p(l.explore.mapUrl);r+='}';
  var blob=new Blob([r],{type:'application/rtf'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='LessonPlan_'+l.title.replace(/[^a-zA-Z0-9]/g,'_').slice(0,40)+'.rtf';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  clog('RTF downloaded: '+a.download,'success');
}
